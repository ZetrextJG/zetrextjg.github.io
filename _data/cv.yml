    About Me:
    - "My journey with programming began in 2017 when I taught myself basic C++. Over the years, my dedication and hard work have significantly expanded my skill set. In 2022, I joined Samsung Research as a Python Developer. My interest in machine learning was quickly recognized, and I have contributed to numerous Natural Language Processing (NLP) projects, both in research and implementation. Additionally, I developed internal command-line interfaces (CLI) and web tools for data processing. For nearly two years, I worked as a Research Software Engineer at MI², where I focused on explaining the decision-making processes of deep learning models using generative models, including diffusion models. This role also allowed me to present a scientific paper at the prestigious International Conference on Learning Representations (ICLR) in 2025. Currently, I am working with the Centre for Credible AI in Warsaw. Here, I am extending methods for model validation into medical and space domains, while also deepening my knowledge in contrastive learning models. Beyond my professional and academic pursuits, I served as the Vice President of the Mathematics Science Club."

